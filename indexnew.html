<!DOCTYPE html>
<html lang="en"> <!-- Setting the websites language to EN -->
<!-- General Page information -->
<head>
  <meta charset="UTF-8" /> <!-- making sure characters are displayed correctly (SOURCE!) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- making sure it looks normal on different screen sizes (SOURCE) -->
  <title>HSG Study Spots</title>
  <!--we are in CSS now -->
  <style>
    * {
      box-sizing: border-box; /* making sure everything stays in the box */
      margin: 0; /* remove space outside an element, so the spacing doesn't look awkward */
      padding: 0; /* remove inside spacing that is not necessary*/
      font-family: Arial, sans-serif; 
    }

    body {
      background-color: #f5f5f5;
      color: #222;
      padding: 30px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .page-title {
      font-size: 18px;
      margin-bottom: 30px;
      color: #333;
    }

    .top-bar {
      display: flex; /* setting components in top bar next to eachother */
      justify-content: space-between; /* aligning them with the same space between components */
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 2px solid #2b6f95;
      margin-bottom: 25px;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #0a8f4d;
    }

    .floor-select select {
      padding: 8px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    .profile {
      font-size: 16px;
      font-weight: 500;
    }

    .availability {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      font-size: 18px;
      font-weight: 600; /* make font bold */
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block; /* keeps dots on the same line while still letting them behave like text with width and height */
    }

    .green {
      background-color: #1db954;
    }

    .orange {
      background-color: #ff9800;
    }

    .red {
      background-color: #e53935;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
      font-size: 15px;
      flex-wrap: wrap; /* puts components of legend on the next line in case there is no space in e.g. mobile version */
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .map-box {
      border: 2px solid #1f4c66;
      border-radius: 8px;
      min-height: 420px;
      padding: 30px;
      background: #fafafa;
      position: relative; /* so box can be used as a reference point */
    }

    .map-title {
      margin-bottom: 20px;
      font-size: 20px;
      font-weight: 600;
      color: #444;
    }

    .seat-grid {
      position:absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .seat {
      position: absolute; 
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer; /* changes cursor to a hand icon when you hover over the element */
      transition: transform 0.15s ease;
    }

    .seat:hover {
      transform: scale(1.3);
    }

    .seat-info {
      margin-top: 30px;
      padding: 16px;
      background: #eef5f8;
      border-radius: 10px;
      font-size: 15px;
      display: none;
    }

    @media (max-width: 768px) { /* media means only use it when the screen is 768px wide or smaller SOURCE*/
      .top-bar {
        flex-direction: column;
        gap: 15px;
        align-items: flex-start;
      }

      .seat-grid {
        grid-template-columns: repeat(5, 1fr);
        gap: 16px;
      }

      .map-box {
        min-height: 350px;
      }
    }
  </style>
</head>
<!-- Now the visible parts of the code start and it changes back to html -->
<body>
  <div class="container">
    <div class="page-title">Home/Main Map Page</div>

    <div class="top-bar">
      <div class="logo">HSG</div>

      <div class="floor-select">
        <select id="floorSelector">
          <option value="1">Floor 1</option>
          <option value="2">Floor 2</option>
          <option value="3">Floor 3</option>
        </select>
      </div>

      <div class="profile">My Profile 👤</div>
    </div>

    <div class="availability">
      <span class="dot green"></span>
      <span><span id="freeSeatCount">0</span> free seats</span>
    </div>

    <div class="legend">
      <span>Legend:</span>
      <div class="legend-item">
        <span class="dot green"></span><span>Free</span>
      </div>
      <div class="legend-item">
        <span class="dot orange"></span><span>Reserved</span>
      </div>
      <div class="legend-item">
        <span class="dot red"></span><span>Occupied</span>
      </div>
    </div>

    <div class="map-box">
      <div class="map-title">Map</div>

      <!--2D map as background image OR iframe-->
      <img id="libraryMap" src="YOUR_MAP_IMAGE_URL" style="width:100%; border-radius:8px;" />

      <!--Seats will float on top-->
      <div id="seatGrid" style="position:absolute; top:0; left:0; width:100%; height:100%;"></div>
    </div>
  </div>
<!-- the following part of the code is about the actual reservation of the seats-->
  <script>
    const seats = [
      { id: "A1", status: "free", x:20, y:30 },
      { id: "A2", status: "occupied", x:25, y:30 },
      { id: "A3", status: "free", x:30, y:30 },
      { id: "A4", status: "reserved", x:35, y:30 },
      { id: "A5", status: "free", x:20, y:45 },
      { id: "A6", status: "occupied", x:25, y:45 },
      { id: "A7", status: "free" },
      { id: "A8", status: "free" },

      { id: "B1", status: "free" },
      { id: "B2", status: "reserved" },
      { id: "B3", status: "occupied" },
      { id: "B4", status: "free" },
      { id: "B5", status: "free" },
      { id: "B6", status: "free" },
      { id: "B7", status: "occupied" },
      { id: "B8", status: "free" },

      { id: "C1", status: "free" },
      { id: "C2", status: "occupied" },
      { id: "C3", status: "reserved" },
      { id: "C4", status: "free" },
      { id: "C5", status: "free" },
      { id: "C6", status: "occupied" },
      { id: "C7", status: "free" },
      { id: "C8", status: "free" }
    ];
//the following functions grab elements out of our html part of the code
    const seatGrid = document.getElementById("seatGrid");
    const freeSeatCount = document.getElementById("freeSeatCount");
    const seatInfo = document.getElementById("seatInfo");

    function getSeatColor(status) {
      if (status === "free") return "green";
      if (status === "reserved") return "orange";
      return "red";
    }

    function renderSeats() {
      seatGrid.innerHTML = "";

      let freeCount = 0;

      seats.forEach(seat => {
        if (seat.status === "free") freeCount++;

        const button = document.createElement("button");
        button.classList.add("seat", getSeatColor(seat.status));
        button.title = `Seat ${seat.id}`;
        button.style.left = seat.x + "%";
        button.style.top = seat.y + "%";

        button.addEventListener("click", () => {
          seatInfo.style.display = "block";
          seatInfo.innerHTML = `
            <strong>Seat ${seat.id}</strong><br>
            Floor: ${document.getElementById("floorSelector").value}<br>
            Status: ${seat.status}<br><br>
            ${
              seat.status === "free"
                ? `<button onclick="reserveSeat('${seat.id}')">Reserve for 10 minutes</button>`
                : `This seat is currently not available.`
            }
          `;
        });

        seatGrid.appendChild(button);
      });

      freeSeatCount.textContent = freeCount;
    }

    function reserveSeat(seatId) {
      const seat = seats.find(s => s.id === seatId);
      if (seat && seat.status === "free") {
        seat.status = "reserved";
        renderSeats();
        seatInfo.style.display = "block";
        seatInfo.innerHTML = `
          <strong>Seat ${seat.id}</strong><br>
          Successfully reserved for 10 minutes.
        `;
      }
    }

    renderSeats();
  </script>
</body>
</html>
